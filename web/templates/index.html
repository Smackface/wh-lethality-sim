{{define "index.html"}}
{{template "header" .}}

<h1 class="text-2xl font-bold mb-6 text-orange-300">Monte Carlo Simulation</h1>

<form hx-post="/simulate"
      hx-target="#results"
      hx-swap="innerHTML"
      hx-indicator="#spinner">

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">

    {{/* ── Attacker ── */}}
    <div class="panel">
      <h2 class="font-semibold text-orange-400 mb-4">⚔ Attacker</h2>

      <label class="lbl">Unit</label>
      <select name="attacker_id"
              hx-get="/partials/unit-details?side=attacker"
              hx-target="#attacker-details"
              hx-include="[name=attacker_id]"
              hx-trigger="change">
        <option value="">— select unit —</option>
        {{range .Units}}
        <option value="{{.ID}}">{{.Label}}</option>
        {{end}}
      </select>

      <div id="attacker-details" class="mt-3 text-sm"></div>

      <label class="lbl mt-4 block">Attach Character <span class="text-gray-600">(optional)</span></label>
      <select name="character_id">
        <option value="">— none —</option>
        {{range .Units}}
        {{if .HasKeyword "CHARACTER"}}
        <option value="{{.ID}}">{{.Label}}</option>
        {{end}}
        {{end}}
      </select>
    </div>

    {{/* ── Defender ── */}}
    <div class="panel">
      <h2 class="font-semibold text-blue-400 mb-4">🛡 Defender</h2>

      <label class="lbl">Unit</label>
      <select name="defender_id"
              hx-get="/partials/unit-details?side=defender"
              hx-target="#defender-details"
              hx-include="[name=defender_id]"
              hx-trigger="change">
        <option value="">— select unit —</option>
        {{range .Units}}
        <option value="{{.ID}}">{{.Label}}</option>
        {{end}}
      </select>

      <div id="defender-details" class="mt-3 text-sm"></div>
    </div>
  </div>

  {{/* ── Configuration ── */}}
  <div class="panel mb-6">
    <h2 class="font-semibold text-gray-300 mb-4">⚙ Configuration</h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

      <div>
        <label class="lbl">Combat Phase</label>
        <select name="phase">
          <option value="shooting">Shooting</option>
          <option value="melee">Melee (Fight)</option>
        </select>
      </div>

      <div>
        <label class="lbl">Simulations</label>
        <select name="iterations">
          <option value="1000">1,000 (fast preview)</option>
          <option value="10000" selected>10,000 (standard)</option>
          <option value="50000">50,000 (precise)</option>
          <option value="100000">100,000 (maximum)</option>
        </select>
      </div>

      <div>
        <label class="lbl">Defender in Cover?</label>
        <label class="flex items-center gap-2 mt-1 cursor-pointer">
          <input type="checkbox" name="defender_in_cover" value="1" class="accent-orange-500 w-4 h-4">
          <span class="text-sm text-gray-300">+1 to defender armour save vs ranged <span class="text-gray-500">(negated by Ignores Cover)</span></span>
        </label>
      </div>

      <div>
        <label class="lbl">Within Half Range?</label>
        <label class="flex items-center gap-2 mt-1 cursor-pointer">
          <input type="checkbox" name="within_half_range" value="1" class="accent-orange-500 w-4 h-4">
          <span class="text-sm text-gray-300">Activates Rapid Fire (X) bonus attacks &amp; Melta (X) bonus damage</span>
        </label>
      </div>

      <div>
        <label class="lbl">Detachment Ability</label>
        <select name="detachment_abilities">
          <option value="">— none —</option>
          {{range .Detachments}}
          {{$det := .}}
          {{range .Abilities}}
          <option value="{{.ID}}">[{{$det.Name}}] {{.Name}}</option>
          {{end}}
          {{end}}
        </select>
      </div>

    </div>
  </div>

  <div class="flex items-center gap-4">
    <button type="submit" class="btn-primary text-base px-8 py-3">
      ▶ Run Simulation
    </button>
    <span id="spinner" class="htmx-indicator text-gray-400 text-sm animate-pulse">
      Simulating…
    </span>
  </div>

</form>

<div id="results" class="mt-8"></div>

{{template "footer" .}}
{{end}}
