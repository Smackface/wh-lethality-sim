{{define "header"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950 text-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WH-Lethality — WH40K Monte Carlo Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .bar-fill { background: #f97316; height: 1rem; min-width: 2px; border-radius: 2px; transition: width 0.3s ease; }
    .tag      { display: inline-block; background: #374151; font-size: .75rem; padding: 1px 8px; border-radius: 4px; color: #d1d5db; margin: 1px; }
    .rule-tag { display: inline-block; background: #7c2d12; font-size: .75rem; padding: 1px 8px; border-radius: 4px; color: #fed7aa; margin: 1px; }
    .panel    { background: #111827; border: 1px solid #374151; border-radius: .75rem; padding: 1rem; }
    label.lbl { display: block; font-size: .875rem; color: #9ca3af; margin-bottom: .25rem; }
    select, input[type=text], input[type=number], textarea {
      width: 100%; background: #1f2937; border: 1px solid #4b5563;
      border-radius: .375rem; padding: .5rem .75rem; color: #f3f4f6;
    }
    select:focus, input:focus, textarea:focus { outline: none; border-color: #f97316; }
    .btn-primary { background: #ea580c; color: white; font-weight: 600; padding: .5rem 1.25rem; border-radius: .375rem; cursor: pointer; border: none; transition: background .15s; }
    .btn-primary:hover { background: #f97316; }
    .btn-ghost { background: transparent; border: 1px solid #4b5563; color: #d1d5db; padding: .375rem .875rem; border-radius: .375rem; cursor: pointer; font-size: .875rem; transition: border-color .15s; }
    .btn-ghost:hover { border-color: #9ca3af; }
    .btn-danger { background: #991b1b; color: white; padding: .375rem .875rem; border-radius: .375rem; cursor: pointer; border: none; font-size: .875rem; }
    .btn-danger:hover { background: #b91c1c; }
  </style>
</head>
<body class="min-h-full">
  <nav class="border-b border-gray-800 px-6 py-3 flex items-center gap-6">
    <span class="font-bold text-orange-400 text-lg tracking-wide">⚔ WH-LETHALITY</span>
    <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors">Simulate</a>
    <a href="/units" class="text-sm text-gray-400 hover:text-white transition-colors">Unit Library</a>
  </nav>
  <main class="px-6 py-6 max-w-6xl mx-auto">
{{end}}

{{define "footer"}}
  </main>
</body>
</html>
{{end}}
